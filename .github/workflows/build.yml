name: Build & Release Latest

# ────────────────────────────────────────────────────────────────
# Trigger: every push to master keeps a single "latest" pre-release.
# Old "latest" release is deleted first, then rebuilt and re-published.
# ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [master]

permissions:
  contents: write   # create / delete releases and upload assets

# ────────────────────────────────────────────────────────────────
# Step 1 — Delete old "latest" release before starting new builds.
#           All build jobs wait for this to finish (needs: prepare).
# ────────────────────────────────────────────────────────────────
jobs:
  prepare:
    name: Delete old "latest" release
    runs-on: ubuntu-latest
    steps:
      - name: Delete release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest \
            --yes \
            --cleanup-tag \
            --repo "$GITHUB_REPOSITORY" || true   # ignore error if release doesn't exist yet

# ────────────────────────────────────────────────────────────────
# Step 2 — Build for all three platforms in parallel.
#           Artifacts are saved to the workflow run (not the release yet).
# ────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
          - os: ubuntu-latest
            platform_flag: --linux
          - os: macos-latest
            platform_flag: --mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Override electron-builder binaries mirror (macOS only)
        if: runner.os == 'macOS'
        run: |
          # The macOS GitHub runner's global npm config points electron-builder
          # binaries to cdn.npmmirror.com, which does NOT host dmg-builder.
          # Writing to GITHUB_ENV sets npm_config_* with higher priority than
          # any .npmrc, reliably overriding the global runner config.
          echo "npm_config_electron_builder_binaries_mirror=https://github.com/electron-userland/electron-builder-binaries/releases/download/" >> $GITHUB_ENV

      - name: Package with electron-builder
        env:
          # Disable OS code-signing on CI (add certs to Secrets to enable)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # electron-builder needs GH_TOKEN to read release info even with --publish never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          # Only upload user-facing files; exclude electron-builder metadata files
          path: |
            dist-release/*.exe
            dist-release/*.dmg
            dist-release/*.AppImage
            dist-release/*.deb
          if-no-files-found: warn

# ────────────────────────────────────────────────────────────────
# Step 3 — Collect all artifacts and publish to a new "latest" release.
#           Runs only after all three build jobs succeed.
# ────────────────────────────────────────────────────────────────
  release:
    name: Publish "latest" release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true   # flatten into a single directory
          path: release-files/

      - name: List artifacts (debug)
        run: ls -lh release-files/

      - name: Create "latest" pre-release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

          gh release create latest \
            --prerelease \
            --title "Latest Build (${BUILD_TIME})" \
            --notes "**Auto-built from commit [\`${COMMIT_SHORT}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})**

          Built: ${BUILD_TIME}
          Branch: \`${{ github.ref_name }}\`

          > This is a rolling pre-release. It is overwritten on every push to \`main\`." \
            --repo "$GITHUB_REPOSITORY"

          # Upload all downloaded artifacts, overwriting any same-named files
          find release-files -type f | xargs -I{} \
            gh release upload latest {} --clobber --repo "$GITHUB_REPOSITORY"
